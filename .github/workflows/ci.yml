name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test-and-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install -r requirements-dev.txt
      - run: python -m pytest -q
      - run: python scripts/make_release_asset.py --ref "$GITHUB_SHA"
      - run: cd dist && sha256sum -c *.sha256
